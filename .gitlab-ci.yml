image: rust:1.93

stages:
  - build
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUSTUP_HOME: "${CI_PROJECT_DIR}/.rustup"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/edumdns"
  DOCKER_CONFIG: /kaniko/.docker/

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - target/
    - .cargo/registry
    - .cargo/git
    - .rustup/

