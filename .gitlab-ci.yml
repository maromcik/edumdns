image: rust:1.93

stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUSTUP_HOME: "${CI_PROJECT_DIR}/.rustup"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - target/
    - .cargo/registry
    - .cargo/git
    - .rustup/

# Test on main branch and merge requests
test:
  stage: test
  script:
    - rustup default stable
    - rustup component add rustfmt
    - cargo fmt --all -- --check
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings
    - cargo test --all
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_MERGE_REQUEST_IID'

# Build all binaries in parallel
build_all:
  stage: build
  parallel:
    matrix:
      - PACKAGE: [edumdns, edumdns_probe, edumdns_proxy]
  script:
    - rustup default stable
    - cd $PACKAGE
    - cargo build --release --package $PACKAGE
  artifacts:
    paths:
      - target/release/$PACKAGE
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Release all binaries (only on tags)
release_all:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    # Upload edumdns binary
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns/${CI_COMMIT_TAG}/edumdns"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns/latest/edumdns"

    # Upload edumdns_probe binary
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns_probe \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns_probe/${CI_COMMIT_TAG}/edumdns_probe"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns_probe \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns_probe/latest/edumdns_probe"

    # Upload edumdns_proxy binary
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns_proxy \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns_proxy/${CI_COMMIT_TAG}/edumdns_proxy"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/edumdns_proxy \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/edumdns_proxy/latest/edumdns_proxy"
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - build_all