image: rust:1.93

stages:
  - build
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUSTUP_HOME: "${CI_PROJECT_DIR}/.rustup"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - target/
    - .cargo/registry
    - .cargo/git
    - .rustup/


# Build edumdns (main binary) - ALL IN 'build' STAGE
build_edumdns:
  stage: build
  before_script:
    - apt-get update
    - rustup default stable
  script:
    - cd edumdns
    - cargo build --release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  artifacts:
    paths:
      - edumdns/target/release/edumdns
    expire_in: 1 week

# Build edumdns_probe - ALSO IN 'build' STAGE
build_probe:
  stage: build
  before_script:
    - apt-get update && apt-get install -y libpcap-dev
    - rustup default stable
  script:
    - cd edumdns_probe
    - cargo build --release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  artifacts:
    paths:
      - edumdns_probe/target/release/edumdns_probe
    expire_in: 1 week

# Build edumdns_proxy - ALSO IN 'build' STAGE
build_proxy:
  stage: build
  before_script:
    - apt-get update
    - rustup default stable
    - rustup toolchain install stable
    - rustup toolchain install nightly --component rust-src
    - cargo install bpf-linker
  script:
    - cd edumdns_proxy
    - cargo build --release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  artifacts:
    paths:
      - edumdns_proxy/target/release/edumdns_proxy
    expire_in: 1 week

# Release edumdns - IN 'release' STAGE
release_edumdns:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    # Upload latest binary
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns/target/release/edumdns \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/latest/edumdns"
    # Also upload to main project package registry
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns/target/release/edumdns \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}/edumdns"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  needs:
    - build_edumdns

# Release edumdns_probe - ALSO IN 'release' STAGE
release_probe:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns_probe/target/release/edumdns_probe \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/latest/edumdns_probe"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns_probe/target/release/edumdns_probe \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}/edumdns_probe"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  needs:
    - build_probe

# Release edumdns_proxy - ALSO IN 'release' STAGE
release_proxy:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns_proxy/target/release/edumdns_proxy \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/latest/edumdns_proxy"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file edumdns_proxy/target/release/edumdns_proxy \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}/edumdns_proxy"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  needs:
    - build_proxy