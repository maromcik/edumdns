# Build edumdns_probe - ALSO IN 'build' STAGE
build_probe:
  stage: build
  before_script:
    - apt-get update && apt-get install -y libpcap-dev
    - rustup default stable
  script:
    - cd edumdns_probe
    - cargo build --release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  artifacts:
    paths:
      - edumdns_probe/target/release/edumdns_probe
    expire_in: 1 week

# Build edumdns_proxy - ALSO IN 'build' STAGE
build_proxy:
  stage: build
  before_script:
    - apt-get update
    - rustup default stable
    - rustup toolchain install stable
    - rustup toolchain install nightly --component rust-src
    - cargo install bpf-linker
  script:
    - cd edumdns_proxy
    - cargo build --release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  artifacts:
    paths:
      - edumdns_proxy/target/release/edumdns_proxy
    expire_in: 1 week

# Build Docker image with Kaniko - ALSO IN 'build' STAGE (runs in parallel)
build_docker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    # Create Docker authentication for GitLab registry
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${IMAGE_NAME}:${CI_COMMIT_TAG}" \
        --destination "${IMAGE_NAME}:latest" \
        --cache=true \
        --cache-ttl=168h \
        --verbosity=info
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  # Optional: Add when manual if you want to control when to build Docker
  # when: manual

